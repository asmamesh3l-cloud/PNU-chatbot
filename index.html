<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الدراسات العليا - جامعة الأميرة نورة</title>
    <!-- مكتبات التشغيل -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #00674733; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00674755; }

        .chat-bubble-ai {
            border: 2px solid #006747;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 103, 71, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-msg { animation: fadeIn 0.3s ease-out forwards; }

        .category-header {
            background: linear-gradient(to left, #006747, #004d35);
            color: white;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 4px;
            margin-top: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        
        .category-header:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-[#f4f9f4]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // قاعدة البيانات الشاملة المحدثة مع تعديل مدة التأجيل لأربعة فصول
        const PNU_DATA = [
            { 
                category: "تعريفات وأحكام عامة",
                items: [
                    { id: 1, title: "المادة الأولى: التعريفات", content: "الدراسات العليا: مرحلة دراسية أعلى من مرحلة البكالوريوس كالدبلوم العالي، أو الماجستير، أو الدكتوراه.\n\nالتصنيف: التصنيف السعودي الموحد للمستويات والتخصصات التعليمية." },
                    { id: 2, title: "المادة الثانية: أهداف الدراسات العليا", content: "تتلخص أهداف الدراسات العليا في العناية بالدراسات الإسلامية والعربية، المساهمة في إثراء المعرفة الإنسانية، تمكين الكفاءات العلمية، وتشجيع البحث العلمي." }
                ]
            },
            {
                category: "القبول والتسجيل",
                items: [
                    { id: 15, title: "المادة 15: قبول الطالب", content: "نص المادة: تتولى الإدارة التنفيذية تنفيذ الإجراءات الأكاديمية، بما في ذلك قبول الطلاب وتسجيلهم.\n\nالقاعدة التنفيذية لجامعة نورة: يلزم تحقيق كافة شروط القبول المعلنة للجامعة والكليات والأقسام أثناء فترة التقديم عبر بوابة القبول الإلكترونية." },
                    { id: 13, title: "المادة 13: شروط القبول", content: "يشترط للقبول في الدراسات العليا: \n1. أن يكون المتقدم حاصلاً على الشهادة الجامعية من جامعة سعودية أو معترف بها.\n2. حسن السيرة والسلوك والياقة الطبية.\n3. تقديم تزكيتين علميتين." },
                    { id: 16, title: "المقررات التكميلية", content: "يجوز للقسم اشتراط اجتياز عدد من المقررات التكميلية من مرحلة سابقة، ولا تحتسب مدتها ضمن المدة النظامية للحصول على الدرجة." }
                ]
            },
            {
                category: "نظام الدراسة والمدد",
                items: [
                    { id: 12, title: "المادة 12: المدة النظامية", content: "تكون الدراسة للماجستير إما بالمقررات فقط، أو المقررات والرسالة، أو المقررات والاختبار الشامل.\n\nالقواعد التنفيذية: لا تزيد مدة دراسة الماجستير عن ستة فصول دراسية، والدكتوراه عن عشرة فصول دراسية." },
                    { id: 11, title: "العبء الدراسي", content: "يحدد العبء الدراسي للطالب وفقاً لما تقتضيه خطة البرنامج المعتمدة، وبما يتناسب مع المعدل التراكمي." }
                ]
            },
            {
                category: "التأجيل والاعتذار",
                items: [
                    { id: 24, title: "المادة 24: تأجيل الدراسة", content: "يجوز للطالب تأجيل دراسته بموافقة مجلس القسم بما لا يتجاوز فصلين دراسيين متتاليين أو أربعة فصول غير متتالية." },
                    { id: 25, title: "المادة 25: الاعتذار عن فصل دراسي", content: "يجوز الاعتذار عن فصل دراسي واحد إذا تقدم الطالب بطلب رسمي قبل الاختبارات النهائية، ولا يحتسب ضمن المدة النظامية." }
                ]
            },
            {
                category: "التحويل والمعادلة",
                items: [
                    { id: 43, title: "المادة 43: التحويل من جامعة أخرى", content: "يجوز قبول تحويل الطالب من جامعة معترف بها بشرط ألا يكون الطالب مفصولاً، وأن يدرس في جامعة نورة 50% على الأقل من البرنامج." },
                    { id: 45, title: "المادة 45: معادلة المقررات", content: "تتم معادلة المقررات التي درسها الطالب خارج الجامعة بشرط ألا يكون قد مضى على اجتيازها أكثر من ستة فصول دراسية، وألا يقل تقديرها عن جيد جداً." }
                ]
            },
            {
                category: "الرسائل العلمية والإشراف",
                items: [
                    { id: 50, title: "المادة 50: الإشراف العلمي", content: "يشرف على الرسائل العلمية الأساتذة والأساتذة المشاركون من أعضاء هيئة التدريس بالجامعة. والحد الأقصى للإشراف هو أربعة رسائل علمية." },
                    { id: 55, title: "المادة 55: مناقشة الرسالة", content: "تشكل لجنة المناقشة بقرار من مجلس الكلية، وتتكون من ثلاثة أعضاء للماجستير وخمسة للدكتوراه." }
                ]
            },
            {
                category: "أحكام ختامية",
                items: [
                    { id: 59, title: "المادة 59: الدبلومات الصحية", content: "يستثنى من أحكام هذه اللائحة الدبلومات الصحية والزمالات الصحية فيطبق عليهما اللوائح والقواعد الصادرة من مجلس الجامعة." },
                    { id: 60, title: "المادة 60: القواعد التنفيذية", content: "نص المادة: يقر مجلس كل جامعة القواعد التنفيذية لهذه اللائحة.\n\nالقاعدة التنفيذية لجامعة نورة: 1. لمجلس الجامعة تفسير القواعد التنفيذية وتعديل ما يلزم منها. 2. يعمل بها من تاريخ اعتماد مجلس الجامعة." }
                ]
            }
        ];

        const Icons = {
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 3 3 9-3 9 19-9Z"/><path d="M6 12h16"/></svg>,
            Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>,
            ChevronUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>
        };

        const normalizeArabic = (text) => {
            if (!text) return "";
            return text
                .replace(/[أإآ]/g, "ا")
                .replace(/ة/g, "ه")
                .replace(/ى/g, "ي")
                .replace(/[\u064B-\u065F]/g, "")
                .toLowerCase();
        };

        const App = () => {
            const [messages, setMessages] = useState([
                { 
                    role: 'assistant', 
                    content: 'مرحباً بكِ في المساعد الرقمي لعمادة الدراسات العليا بجامعة الأميرة نورة بنت عبد الرحمن. يسعدني مساعدتكِ في تصفح اللائحة المنظمة والبحث عن كافة المعلومات التي تهمكِ في مسيرتكِ الأكاديمية.' 
                }
            ]);
            const [input, setInput] = useState('');
            const [openCategories, setOpenCategories] = useState({});
            const messagesEndRef = useRef(null);
            
            const pnuLogo = "https://pnu.edu.sa/Style%20Library/NewStyle/UI5/images/pnu-logo-ar.svg";

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const showContent = (title, content) => {
                setMessages(prev => [...prev, { role: 'user', content: title }, { role: 'assistant', content: content }]);
            };

            const toggleCategory = (idx) => {
                setOpenCategories(prev => ({ ...prev, [idx]: !prev[idx] }));
            };

            const handleSearch = () => {
                const query = input.trim();
                if (!query) return;
                
                const normalizedQuery = normalizeArabic(query);
                const results = [];
                
                PNU_DATA.forEach(cat => {
                    cat.items.forEach(item => {
                        if (normalizeArabic(item.title).includes(normalizedQuery) || 
                            normalizeArabic(item.content).includes(normalizedQuery)) {
                            results.push(item);
                        }
                    });
                });

                setMessages(prev => [...prev, 
                    { role: 'user', content: `البحث عن: ${query}` }, 
                    { role: 'assistant', content: results.length > 0 
                        ? `نتائج البحث عن "${query}":\n\n` + results.map(r => `📌 **${r.title}**\n${r.content}`).join('\n\n---\n\n')
                        : `نعتذر، لم نجد نتائج مطابقة للكلمة "${query}" في لائحة الدراسات العليا.`
                    }
                ]);
                setInput('');
            };

            return (
                <div className="flex h-screen w-full bg-[#f4f9f4] text-slate-800" dir="rtl">
                    <aside className="hidden md:flex flex-col w-96 border-l border-[#daeada] bg-white shadow-xl overflow-hidden">
                        <div className="p-6 border-b border-emerald-100 text-center bg-white">
                            <div className="w-20 h-20 mx-auto rounded-xl bg-white p-1 mb-3 border border-emerald-50 shadow-sm">
                                <img src={pnuLogo} alt="PNU Logo" className="w-full h-full object-contain" />
                            </div>
                            <h1 className="font-black text-[#006747] text-sm">اللائحة والقواعد التنفيذية</h1>
                            <p className="text-[10px] text-emerald-600/60 font-bold uppercase tracking-widest mt-1">جامعة الأميرة نورة بنت عبد الرحمن</p>
                        </div>

                        <nav className="flex-1 overflow-y-auto p-4 no-scrollbar">
                            {PNU_DATA.map((cat, idx) => (
                                <div key={idx} className="mb-2">
                                    <div className="category-header" onClick={() => toggleCategory(idx)}>
                                        <span>{cat.category}</span>
                                        {openCategories[idx] ? <Icons.ChevronUp /> : <Icons.ChevronDown />}
                                    </div>
                                    {openCategories[idx] && (
                                        <div className="space-y-1 mt-1 pr-2 border-r-2 border-emerald-100 animate-msg">
                                            {cat.items.map(item => (
                                                <button key={item.id} onClick={() => showContent(item.title, item.content)}
                                                    className="w-full text-right px-3 py-2.5 rounded-lg hover:bg-emerald-50 transition-colors flex items-center gap-2 group border border-transparent hover:border-emerald-100">
                                                    <div className="text-[#006747] opacity-40 group-hover:opacity-100 shrink-0"><Icons.Book /></div>
                                                    <span className="text-xs font-semibold text-slate-600 group-hover:text-[#006747]">{item.title}</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </nav>
                        <div className="p-4 border-t bg-gray-50 text-center">
                            <div className="flex items-center justify-center gap-2 text-[#006747]">
                                <Icons.Info />
                                <span className="text-[10px] font-bold tracking-tight">نظام مرجعي ذكي للائحة الدراسات العليا</span>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        <header className="px-6 py-4 border-b bg-white flex items-center justify-between shadow-sm z-10">
                            <div className="flex items-center gap-3">
                                <div className="md:hidden w-10 h-10 bg-white p-1 rounded-lg border border-emerald-100 shadow-sm"><img src={pnuLogo} className="w-full h-full object-contain" /></div>
                                <div>
                                    <h2 className="font-black text-[#006747]">مساعد الدراسات العليا الرقمي</h2>
                                    <p className="text-[9px] text-emerald-600/50 font-bold uppercase tracking-tighter">عمادة الدراسات العليا - جامعة نورة</p>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-10 space-y-6 no-scrollbar">
                            {messages.map((msg, index) => (
                                <div key={index} className={`flex ${msg.role === 'user' ? 'justify-start' : 'justify-end'} animate-msg`}>
                                    <div className={`max-w-[85%] md:max-w-[80%] rounded-[2rem] p-6 shadow-sm ${msg.role === 'user' ? 'bg-white border border-emerald-50' : 'chat-bubble-ai text-slate-800'}`}>
                                        <div className="text-[10px] font-black mb-1 opacity-30 uppercase tracking-widest border-b border-emerald-50 pb-1 mb-2">
                                            {msg.role === 'assistant' ? 'نص اللائحة التنفيذية' : 'استفسار الباحثة'}
                                        </div>
                                        <div className="text-sm md:text-base leading-[1.8] font-medium whitespace-pre-wrap">{msg.content}</div>
                                    </div>
                                </div>
                            ))}
                            <div ref={messagesEndRef} />
                        </div>

                        <div className="p-4 md:p-6 bg-white border-t border-emerald-50 shadow-2xl">
                            <div className="max-w-4xl mx-auto relative flex items-center">
                                <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSearch()} 
                                    placeholder="اكتبي كلمة للبحث (مثل: تأجيل، قبول، دراسة)..." 
                                    className="w-full py-5 pr-5 pl-14 rounded-full border-2 border-emerald-50 bg-[#fcfdfc] focus:border-[#006747] outline-none font-bold shadow-inner text-sm" />
                                <button onClick={handleSearch} className="absolute left-3 p-3 rounded-full bg-[#006747] text-white transition-transform active:scale-95 shadow-lg"><Icons.Search /></button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
