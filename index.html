<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الدراسات العليا - جامعة الأميرة نورة</title>
    <!-- مكتبات التشغيل -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #00674733; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00674755; }

        .chat-bubble-ai {
            border: 2px solid #006747;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 103, 71, 0.05);
        }

        .highlight {
            background-color: #d1fae5;
            color: #065f46;
            font-weight: bold;
            padding: 0 2px;
            border-radius: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-msg { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#f4f9f4]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // داتا اللائحة المدمجة (مستخرجة من الملف المرفق)
        const PNU_REGULATIONS = [
            { id: 1, title: "المادة الأولى: التعريفات", content: "الدراسات العليا هي مرحلة دراسية أعلى من مرحلة البكالوريوس كالدبلوم العالي، أو الماجستير، أو الدكتوراه. التصنيف هو التصنيف السعودي الموحد للمستويات والتخصصات التعليمية." },
            { id: 2, title: "المادة الثالثة: شروط القبول", content: "يشترط للقبول في الدراسات العليا: 1. أن يكون المتقدم حاصلاً على الشهادة الجامعية من جامعة سعودية أو جامعة معترف بها. 2. أن يكون حسن السيرة والسلوك ولائقاً طبياً. 3. تقديم تزكيتين علميتين. 4. موافقة مرجعه على الدراسة إذا كان موظفاً." },
            { id: 3, title: "القاعدة التنفيذية للمادة الثالثة (جامعة نورة)", content: "يجوز للقسم المختص اشتراط اجتياز عدد من المقررات التكميلية. كما يشترط الحصول على درجة محددة في اختبارات القدرات العامة للجامعيين أو ما يعادلها." },
            { id: 4, title: "المادة الثامنة عشر: مدة الدراسة", content: "المدة النظامية للحصول على الدبلوم العالي لا تقل عن فصلين دراسيين ولا تزيد عن أربعة فصول." },
            { id: 5, title: "المادة التاسعة عشر: مدة الماجستير", content: "المدة النظامية للحصول على درجة الماجستير لا تقل عن أربعة فصول دراسية ولا تزيد عن ستة فصول دراسية." },
            { id: 6, title: "المادة العشرون: مدة الدكتوراه", content: "المدة النظامية للحصول على درجة الدكتوراه لا تقل عن ستة فصول دراسية ولا تزيد عن عشرة فصول دراسية." },
            { id: 7, title: "المادة الرابعة والعشرون: التأجيل والاعتذار", content: "يجوز للطالب تأجيل دراسته قبل بدء الفصل الدراسي بما لا يتجاوز فصلين دراسيين متتاليين أو ثلاثة فصول غير متتالية." },
            { id: 8, title: "المادة الخامسة والثلاثون: الرسالة العلمية", content: "يتم اختيار موضوع الرسالة من قبل الطالب ويقره مجلس القسم ومجلس الكلية. يجب أن يتسم الموضوع بالأصالة والإضافة العلمية." },
            { id: 9, title: "القواعد العامة", content: "تطبق هذه اللائحة على جميع طالبات الدراسات العليا بجامعة الأميرة نورة بنت عبد الرحمن. مجلس الجامعة هو المرجع لتفسير هذه القواعد." }
        ];

        const Icons = {
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 3 3 9-3 9 19-9Z"/><path d="M6 12h16"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        };

        const App = () => {
            const [messages, setMessages] = useState([
                { 
                    role: 'assistant', 
                    content: 'مرحباً بكِ في محرك البحث الذكي لجامعة الأميرة نورة. يمكنني البحث لكِ في نصوص اللائحة والقواعد التنفيذية فوراً. ما الذي تودين البحث عنه؟ (مثال: شروط القبول، مدة الدراسة)' 
                }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const messagesEndRef = useRef(null);
            
            const pnuLogo = "https://pnu.edu.sa/Style%20Library/NewStyle/UI5/images/pnu-logo-ar.svg";

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            // دالة البحث النصي
            const performSearch = (query) => {
                const searchTerms = query.toLowerCase().split(' ').filter(t => t.length > 2);
                if (searchTerms.length === 0) return null;

                return PNU_REGULATIONS.filter(item => {
                    const fullText = (item.title + " " + item.content).toLowerCase();
                    return searchTerms.some(term => fullText.includes(term));
                });
            };

            const handleSend = () => {
                if (!input.trim()) return;

                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setLoading(true);

                // محاكاة تأخير بسيط للبحث
                setTimeout(() => {
                    const results = performSearch(input);
                    let responseContent = "";

                    if (results && results.length > 0) {
                        responseContent = `وجدت لكِ ${results.length} نتائج في اللائحة:\n\n` + 
                            results.map(r => `📌 **${r.title}**\n${r.content}`).join('\n\n---\n\n');
                    } else {
                        responseContent = "عذراً، لم أجد نصوصاً مطابقة تماماً في اللائحة الحالية. حاولي استخدام كلمات مفتاحية أخرى مثل 'قبول'، 'رسالة'، أو 'تأجيل'.";
                    }

                    setMessages(prev => [...prev, { role: 'assistant', content: responseContent }]);
                    setLoading(false);
                    setInput('');
                }, 500);
            };

            return (
                <div className="flex h-screen w-full bg-[#f4f9f4] text-slate-800" dir="rtl">
                    
                    {/* القائمة الجانبية */}
                    <aside className="hidden md:flex flex-col w-80 border-l border-[#daeada] bg-white shadow-lg p-6">
                        <div className="flex flex-col items-center gap-4 mb-10 text-center">
                            <div className="w-24 h-24 rounded-2xl overflow-hidden shadow-md bg-white p-2 border border-emerald-100">
                                <img src={pnuLogo} alt="PNU Logo" className="w-full h-full object-contain" />
                            </div>
                            <h1 className="font-bold text-lg text-[#006747]">جامعة الأميرة نورة</h1>
                            <p className="text-[10px] text-gray-400 font-bold tracking-widest uppercase">دليل الدراسات العليا</p>
                        </div>

                        <nav className="flex-1 space-y-4">
                            <div className="text-[11px] font-black text-gray-400 uppercase tracking-widest px-2 mb-2">كلمات شائعة</div>
                            {["شروط القبول", "مدة الدراسة", "تأجيل الدراسة", "الرسالة العلمية"].map((cmd) => (
                                <button 
                                    key={cmd}
                                    onClick={() => { setInput(cmd); }}
                                    className="w-full flex items-center gap-3 p-4 rounded-2xl border border-emerald-50 bg-white hover:bg-emerald-50 transition-all shadow-sm text-sm font-bold text-[#006747]"
                                >
                                    <Icons.Search />
                                    <span>{cmd}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto p-4 bg-emerald-900 rounded-2xl text-[10px] text-emerald-100 opacity-80 text-center leading-relaxed">
                            هذا النظام يعمل محلياً بالكامل ولا يحتاج لاتصال خارجي بالذكاء الاصطناعي.
                        </div>
                    </aside>

                    {/* المحتوى الرئيسي */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        <header className="px-6 py-4 border-b bg-white flex items-center justify-between shadow-sm z-10">
                            <div className="flex items-center gap-3">
                                <div className="md:hidden w-10 h-10 bg-white p-1 rounded-lg border border-emerald-100"><img src={pnuLogo} className="w-full h-full object-contain" /></div>
                                <div>
                                    <h2 className="font-black text-[#006747]">مساعد اللائحة (نسخة GitHub)</h2>
                                    <p className="text-[9px] text-emerald-600/50 font-bold">نظام بحث نصي فوري داخل الملف</p>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-10 space-y-6 no-scrollbar">
                            {messages.map((msg, index) => (
                                <div key={index} className={`flex ${msg.role === 'user' ? 'justify-start' : 'justify-end'} animate-msg`}>
                                    <div className={`max-w-[85%] md:max-w-[75%] rounded-[2rem] p-6 shadow-sm ${msg.role === 'user' ? 'bg-white border border-emerald-50' : 'chat-bubble-ai text-slate-800'}`}>
                                        <div className="text-[10px] font-black mb-1 opacity-40 uppercase tracking-widest border-b border-emerald-50 pb-1 flex items-center gap-2">
                                            {msg.role === 'assistant' ? <Icons.Shield /> : <Icons.User />}
                                            {msg.role === 'assistant' ? 'مساعد نورة' : 'الباحثة'}
                                        </div>
                                        <div className="text-sm md:text-base leading-relaxed font-medium mt-2 whitespace-pre-wrap">{msg.content}</div>
                                    </div>
                                </div>
                            ))}
                            {loading && <div className="flex justify-end text-[#006747] font-bold text-xs animate-pulse">جاري البحث في مواد اللائحة...</div>}
                            <div ref={messagesEndRef} />
                        </div>

                        <div className="p-4 md:p-6 bg-white border-t border-emerald-50">
                            <div className="max-w-4xl mx-auto relative flex items-center">
                                <input 
                                    type="text" 
                                    value={input} 
                                    onChange={(e) => setInput(e.target.value)} 
                                    onKeyPress={(e) => e.key === 'Enter' && handleSend()} 
                                    placeholder="اكتبي كلمة للبحث (مثلاً: قبول، مدة، دكتوراه)..." 
                                    className="w-full py-5 pr-5 pl-14 rounded-full border-2 border-emerald-50 bg-[#fcfdfc] focus:border-[#006747] outline-none font-bold shadow-inner"
                                />
                                <button 
                                    onClick={handleSend} 
                                    className="absolute left-3 p-3 rounded-full bg-[#006747] text-white transition-transform active:scale-95 shadow-md"
                                >
                                    <Icons.Send />
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
