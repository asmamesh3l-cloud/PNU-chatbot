<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الدراسات العليا - جامعة الأميرة نورة</title>
    <!-- مكتبات التشغيل -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- أيقونات Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #00674733; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00674755; }

        .chat-bubble-ai {
            border: 2px solid #006747;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 103, 71, 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // الأيقونات كأجزاء برمجية بسيطة (SVG) لضمان العمل بدون استيراد
        const Icons = {
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-send-horizontal"><path d="m3 3 3 9-3 9 19-9Z"/><path d="M6 12h16"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            File: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14.5 2 14.5 7 20 7"/></svg>,
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        };

        const App = () => {
            const [messages, setMessages] = useState([
                { 
                    role: 'assistant', 
                    content: 'مرحباً بكِ في المساعد الذكي لجامعة الأميرة نورة بنت عبد الرحمن. أنا هنا للإجابة على استفساراتكِ حصرياً بناءً على "اللائحة المنظمة للدراسات العليا وقواعدها التنفيذية بجامعة الأميرة نورة". كيف يمكنني خدمتكِ اليوم؟' 
                }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const messagesEndRef = useRef(null);

            const apiKey = ""; // يتم توفيره في البيئة
            const pnuLogo = "https://drive.google.com/uc?export=view&id=1xyWQeaftK_5nkxrn7BaWYOIxc9iCsUfI";

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const quickCommands = [
                { id: 'pnu_admission', label: 'شروط القبول', icon: <Icons.User />, prompt: 'ما هي شروط القبول العامة والخاصة في الدراسات العليا بجامعة الأميرة نورة بناءً على اللائحة المرفقة؟' },
                { id: 'pnu_duration', label: 'مدة الدراسة النظامية', icon: <Icons.Clock />, prompt: 'ما هي مدة الدراسة النظامية للماجستير والدكتوراه حسب القواعد التنفيذية لجامعة الأميرة نورة؟' },
                { id: 'pnu_thesis', label: 'تسجيل الرسالة', icon: <Icons.File />, prompt: 'اشرحي لي إجراءات تسجيل الرسالة العلمية حسب القواعد المذكورة في ملف جامعة الأميرة نورة.' },
                { id: 'pnu_defer', label: 'التأجيل والاعتذار', icon: <Icons.Alert />, prompt: 'ما هي ضوابط تأجيل الدراسة أو الاعتذار عنها في جامعة الأميرة نورة كما ورد في اللائحة؟' },
            ];

            const handleSend = async (text = input) => {
                if (!text.trim()) return;

                const userMessage = { role: 'user', content: text };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `السؤال: ${text}. تعليمات: استخدمي حصرياً ملف اللائحة التنفيذية لجامعة الأميرة نورة. إذا لم تجدي الإجابة قولي أنها غير متوفرة. خاطبي المستخدمة بصيغة المؤنث.` }] }],
                            systemInstruction: { parts: [{ text: "أنتِ المساعدة الذكية لجامعة الأميرة نورة (PNU). إجاباتكِ دقيقة ومستمدة من اللائحة فقط." }] }
                        })
                    });

                    const result = await response.json();
                    const aiResponse = result.candidates?.[0]?.content?.parts?.[0]?.text || "نعتذر، لم نتمكن من الوصول للمعلومة المطلوبة حالياً.";
                    setMessages(prev => [...prev, { role: 'assistant', content: aiResponse }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "عذراً، حدث خطأ في الاتصال. يرجى المحاولة لاحقاً." }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className={`flex h-screen w-full ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-[#f4f9f4] text-slate-800'}`} dir="rtl">
                    {/* القائمة الجانبية */}
                    <aside className={`hidden md:flex flex-col w-80 border-l ${isDarkMode ? 'border-slate-700 bg-slate-800' : 'border-[#daeada] bg-white shadow-lg'} p-6`}>
                        <div className="flex flex-col items-center gap-4 mb-10 text-center">
                            <div className="w-24 h-24 rounded-2xl overflow-hidden shadow-md bg-white p-2 border border-emerald-100">
                                <img src={pnuLogo} alt="PNU Logo" className="w-full h-full object-contain" />
                            </div>
                            <div>
                                <h1 className="font-bold text-lg text-[#006747] dark:text-emerald-400">جامعة الأميرة نورة</h1>
                                <p className="text-xs text-emerald-700/60 font-bold uppercase tracking-widest">عمادة الدراسات العليا</p>
                            </div>
                        </div>

                        <nav className="flex-1 space-y-3 overflow-y-auto no-scrollbar">
                            <div className="flex items-center gap-2 mb-4 px-2 opacity-50">
                                <Icons.Shield />
                                <p className="text-[11px] font-black tracking-widest">محرك بحث اللائحة</p>
                            </div>
                            {quickCommands.map((cmd) => (
                                <button
                                    key={cmd.id}
                                    onClick={() => handleSend(cmd.prompt)}
                                    className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl transition-all text-right border
                                        ${isDarkMode ? 'hover:bg-slate-700 border-slate-700 bg-slate-800/50' : 'hover:bg-emerald-50 border-[#daeada] bg-white'}`}
                                >
                                    <div className="p-2 rounded-lg bg-emerald-50 text-[#006747]">
                                        {cmd.icon}
                                    </div>
                                    <span className="text-sm font-bold">{cmd.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="mt-auto pt-4 space-y-3 text-center">
                            <button 
                                onClick={() => setIsDarkMode(!isDarkMode)}
                                className="w-full flex items-center justify-between px-4 py-3 rounded-xl border border-[#daeada] bg-white text-sm font-semibold"
                            >
                                <div className="flex items-center gap-3">
                                    {isDarkMode ? <Icons.Sun /> : <Icons.Moon />}
                                    <span>{isDarkMode ? 'الوضع النهاري' : 'الوضع الليلي'}</span>
                                </div>
                            </button>
                            <div className="p-4 bg-emerald-900 rounded-2xl text-[10px] text-emerald-100 opacity-80">
                            </div>
                        </div>
                    </aside>

                    {/* منطقة المحادثة */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden">
                        <header className={`px-6 py-4 border-b ${isDarkMode ? 'border-slate-700 bg-slate-800' : 'border-[#daeada] bg-white'} flex items-center justify-between shadow-sm`}>
                            <div className="flex items-center gap-3">
                                <div className="md:hidden w-10 h-10 bg-white p-1 rounded-lg border border-emerald-100">
                                    <img src={pnuLogo} alt="Logo" className="w-full h-full object-contain" />
                                </div>
                                <div>
                                    <h2 className="font-black text-[#006747] dark:text-emerald-400">مساعد اللائحة الذكي</h2>
                                    <p className="text-[10px] text-emerald-600/50 font-bold italic">البحث في ملف اللائحة فقط</p>
                                </div>
                            </div>
                        </header>

                        <div className={`flex-1 overflow-y-auto p-4 md:p-10 space-y-8 ${isDarkMode ? 'bg-slate-900' : 'bg-[#f4f9f4]'} no-scrollbar`}>
                            {messages.map((msg, index) => (
                                <div key={index} className={`flex ${msg.role === 'user' ? 'justify-start' : 'justify-end'}`}>
                                    <div className={`max-w-[85%] md:max-w-[75%] rounded-3xl p-5 shadow-sm relative
                                        ${msg.role === 'user' 
                                            ? (isDarkMode ? 'bg-slate-800 border border-slate-700' : 'bg-white border border-[#daeada]') 
                                            : 'chat-bubble-ai'
                                        }`}>
                                        <div className="flex items-center justify-between mb-2 opacity-50 border-b border-gray-50 pb-1">
                                            <span className="text-[10px] font-black uppercase tracking-widest">
                                                {msg.role === 'assistant' ? 'مساعد جامعة نورة' : 'الباحثـة'}
                                            </span>
                                        </div>
                                        <div className="text-sm md:text-base leading-relaxed font-medium">
                                            {msg.content}
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {loading && (
                                <div className="flex justify-end">
                                    <div className="bg-[#006747] text-white rounded-3xl p-5 flex items-center gap-3">
                                        <div className="flex gap-1">
                                            <span className="w-2 h-2 bg-white rounded-full animate-bounce"></span>
                                            <span className="w-2 h-2 bg-white rounded-full animate-bounce [animation-delay:0.2s]"></span>
                                            <span className="w-2 h-2 bg-white rounded-full animate-bounce [animation-delay:0.4s]"></span>
                                        </div>
                                        <span className="text-xs font-bold">جاري البحث...</span>
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>

                        <div className={`p-4 md:p-6 ${isDarkMode ? 'bg-slate-800 border-t border-slate-700' : 'bg-white border-t border-[#daeada]'}`}>
                            <div className="max-w-4xl mx-auto relative flex items-center">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                    placeholder="اسألي عن شروط القبول، المواد، أو الأنظمة..."
                                    className={`w-full py-5 pr-5 pl-14 rounded-[2rem] border-2 transition-all outline-none font-bold
                                        ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white' : 'bg-[#fcfdfc] border-[#daeada] shadow-inner focus:border-[#006747]'}`}
                                />
                                <button 
                                    onClick={() => handleSend()}
                                    disabled={loading || !input.trim()}
                                    className={`absolute left-3 p-3 rounded-full transition-all shadow-lg text-white
                                        ${loading || !input.trim() ? 'bg-gray-300' : 'bg-[#006747] hover:scale-105 active:scale-95'}`}
                                >
                                    <Icons.Send />
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
