<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الدراسات العليا - جامعة الأميرة نورة</title>
    <!-- مكتبات التشغيل -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #00674733; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00674755; }

        .chat-bubble-ai {
            border: 2px solid #006747;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 103, 71, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-msg { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#f4f9f4]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 3 3 9-3 9 19-9Z"/><path d="M6 12h16"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            File: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14.5 2 14.5 7 20 7"/></svg>,
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/></svg>
        };

        const App = () => {
            const [messages, setMessages] = useState([
                { 
                    role: 'assistant', 
                    content: 'مرحباً بكِ في المساعد الذكي لجامعة الأميرة نورة. أنا هنا لمساعدتكِ في البحث داخل اللائحة المنظمة للدراسات العليا. كيف يمكنني خدمتكِ اليوم؟' 
                }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false);
            
            const messagesEndRef = useRef(null);
            const apiKey = ""; // تم ضبطه كقيمة فارغة ليتم حقنه تلقائياً في بيئة التشغيل
            const pnuLogo = "https://pnu.edu.sa/Style%20Library/NewStyle/UI5/images/pnu-logo-ar.svg";
            const pdfUrl = "";

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const handleSend = async (text = input) => {
                if (!text.trim()) return;

                const userMessage = { role: 'user', content: text };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ 
                                parts: [{ 
                                    text: `السؤال: ${text}. المصدر الحصري: ${pdfUrl}. التعليمات: أجيبي فقط من المصدر المذكور وبصيغة المؤنث وبطريقة منظمة.` 
                                }] 
                            }],
                            systemInstruction: { 
                                parts: [{ text: "أنتِ المساعدة الذكية لجامعة الأميرة نورة. ابحثي في اللائحة المرفقة وقدمي إجابات دقيقة وموثقة." }] 
                            }
                        })
                    });

                    const result = await response.json();
                    
                    if (result.error) {
                        throw new Error(result.error.message);
                    }

                    const aiResponse = result.candidates?.[0]?.content?.parts?.[0]?.text || "لم أجد إجابة محددة في بنود اللائحة المتاحة.";
                    setMessages(prev => [...prev, { role: 'assistant', content: aiResponse }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "عذراً، حدث خطأ أثناء الاتصال بالذكاء الاصطناعي. يرجى المحاولة مرة أخرى." }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className={`flex h-screen w-full ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-[#f4f9f4] text-slate-800'}`} dir="rtl">
                    
                    {/* القائمة الجانبية */}
                    <aside className={`hidden md:flex flex-col w-80 border-l ${isDarkMode ? 'border-slate-700 bg-slate-800' : 'border-[#daeada] bg-white shadow-lg'} p-6`}>
                        <div className="flex flex-col items-center gap-4 mb-10 text-center">
                            <div className="w-24 h-24 rounded-2xl overflow-hidden shadow-md bg-white p-2 border border-emerald-100 transition-transform hover:scale-105">
                                <img src={pnuLogo} alt="PNU Logo" className="w-full h-full object-contain" />
                            </div>
                            <h1 className="font-bold text-lg text-[#006747] dark:text-emerald-400">جامعة الأميرة نورة</h1>
                            <p className="text-[10px] text-gray-400 font-bold tracking-widest">عمادة الدراسات العليا</p>
                        </div>

                        <nav className="flex-1 space-y-4">
                            <div className="text-[11px] font-black text-gray-400 uppercase tracking-widest px-2 mb-2">الوصول السريع</div>
                            <button onClick={() => handleSend("ما هي شروط القبول في الدراسات العليا؟")} className="w-full flex items-center gap-3 p-4 rounded-2xl border border-emerald-50 bg-white hover:bg-emerald-50 transition-all shadow-sm">
                                <div className="p-2 bg-emerald-50 text-[#006747] rounded-lg"><Icons.User /></div>
                                <span className="text-sm font-bold">شروط القبول</span>
                            </button>
                            <button onClick={() => handleSend("ما هي مدة الدراسة النظامية للبرامج؟")} className="w-full flex items-center gap-3 p-4 rounded-2xl border border-emerald-50 bg-white hover:bg-emerald-50 transition-all shadow-sm">
                                <div className="p-2 bg-emerald-50 text-[#006747] rounded-lg"><Icons.Clock /></div>
                                <span className="text-sm font-bold">مدة الدراسة</span>
                            </button>
                            <button onClick={() => handleSend("ما هي إجراءات تسجيل الرسالة العلمية؟")} className="w-full flex items-center gap-3 p-4 rounded-2xl border border-emerald-50 bg-white hover:bg-emerald-50 transition-all shadow-sm">
                                <div className="p-2 bg-emerald-50 text-[#006747] rounded-lg"><Icons.File /></div>
                                <span className="text-sm font-bold">تسجيل الرسالة</span>
                            </button>
                        </nav>

                        <div className="mt-auto space-y-3 pt-4 border-t border-emerald-50">
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-full flex items-center justify-between px-4 py-3 rounded-xl border border-emerald-100 bg-white text-sm font-semibold shadow-sm hover:bg-gray-50 transition-colors">
                                <div className="flex items-center gap-3">{isDarkMode ? <Icons.Sun /> : <Icons.Moon />} <span>الوضع {isDarkMode ? 'النهاري' : 'الليلي'}</span></div>
                            </button>
                            <div className="p-4 bg-emerald-900 rounded-2xl text-[10px] text-emerald-100 opacity-80 text-center leading-relaxed">
                                بحث موثق داخل اللائحة المعتمدة لجامعة نورة © 2024
                            </div>
                        </div>
                    </aside>

                    {/* المحتوى الرئيسي */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        <header className={`px-6 py-4 border-b ${isDarkMode ? 'border-slate-700 bg-slate-800' : 'bg-white'} flex items-center justify-between shadow-sm z-10`}>
                            <div className="flex items-center gap-3">
                                <div className="md:hidden w-10 h-10 bg-white p-1 rounded-lg border border-emerald-100"><img src={pnuLogo} className="w-full h-full object-contain" /></div>
                                <div>
                                    <h2 className="font-black text-[#006747] dark:text-emerald-400">المساعد الذكي للائحة</h2>
                                    <p className="text-[9px] text-emerald-600/50 font-bold">نظام بحث مقيد بلائحة جامعة نورة فقط</p>
                                </div>
                            </div>
                        </header>

                        <div className={`flex-1 overflow-y-auto p-4 md:p-10 space-y-6 ${isDarkMode ? 'bg-slate-900' : 'bg-[#f4f9f4]'} no-scrollbar`}>
                            {messages.map((msg, index) => (
                                <div key={index} className={`flex ${msg.role === 'user' ? 'justify-start' : 'justify-end'} animate-msg`}>
                                    <div className={`max-w-[85%] md:max-w-[70%] rounded-[2rem] p-6 shadow-sm ${msg.role === 'user' ? 'bg-white border border-emerald-50' : 'chat-bubble-ai text-slate-800'}`}>
                                        <div className="text-[10px] font-black mb-1 opacity-40 uppercase tracking-widest border-b border-emerald-50 pb-1 flex items-center gap-2">
                                            {msg.role === 'assistant' ? <Icons.Shield /> : <Icons.User />}
                                            {msg.role === 'assistant' ? 'مساعد جامعة نورة' : 'الباحثة'}
                                        </div>
                                        <div className="text-sm md:text-base leading-relaxed font-medium mt-2">{msg.content}</div>
                                    </div>
                                </div>
                            ))}
                            {loading && (
                                <div className="flex justify-end animate-pulse items-center gap-2 text-[#006747] font-bold text-xs">
                                    <div className="flex gap-1">
                                        <div className="w-1.5 h-1.5 bg-[#006747] rounded-full animate-bounce"></div>
                                        <div className="w-1.5 h-1.5 bg-[#006747] rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                        <div className="w-1.5 h-1.5 bg-[#006747] rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                    </div>
                                    جاري مراجعة بنود اللائحة...
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>

                        <div className={`p-4 md:p-6 ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-emerald-50'} border-t`}>
                            <div className="max-w-4xl mx-auto relative flex items-center">
                                <input 
                                    type="text" 
                                    value={input} 
                                    onChange={(e) => setInput(e.target.value)} 
                                    onKeyPress={(e) => e.key === 'Enter' && handleSend()} 
                                    placeholder="اسألي عن شروط القبول، المواد، أو الأنظمة..." 
                                    className={`w-full py-5 pr-5 pl-14 rounded-full border-2 transition-all outline-none font-bold shadow-inner text-sm md:text-base
                                        ${isDarkMode ? 'bg-slate-900 border-slate-700 text-white focus:border-emerald-500' : 'bg-[#fcfdfc] border-emerald-50 focus:border-[#006747]'}`} 
                                />
                                <button 
                                    onClick={() => handleSend()} 
                                    disabled={loading || !input.trim()}
                                    className={`absolute left-3 p-3 rounded-full text-white transition-all shadow-lg
                                        ${loading || !input.trim() ? 'bg-gray-200' : 'bg-[#006747] hover:bg-[#004d35] active:scale-95'}`}
                                >
                                    <Icons.Send />
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
