<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز تطوير محتوى H5P - مودل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        :root {
            --moodle-orange: #f98012;
            --moodle-bg: #f0f2f5;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--moodle-bg);
            margin: 0;
            overflow-x: hidden;
        }

        .moodle-gradient {
            background: linear-gradient(135deg, #f98012 0%, #f35912 100%);
        }

        .drop-zone {
            border: 2px dashed #cbd5e0;
            transition: all 0.3s ease;
            background: #fff;
        }

        .drop-zone.active {
            border-color: var(--moodle-orange);
            background-color: #fffaf0;
            transform: scale(1.02);
        }

        .sidebar-item:hover {
            background-color: #f8f9fa;
            border-right: 4px solid var(--moodle-orange);
        }

        /* Loading Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--moodle-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Moodle Header -->
    <nav class="bg-white border-b h-16 flex items-center justify-between px-6 sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <i class="fas fa-bars text-gray-500 cursor-pointer hover:text-gray-800"></i>
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Moodle-logo.svg" alt="Moodle" class="h-8">
        </div>
        <div class="flex items-center gap-6">
            <div class="hidden md:flex bg-green-100 text-green-700 text-[10px] px-3 py-1 rounded-full font-bold">
                متصل الآن عبر GitHub
            </div>
            <div class="flex items-center gap-2 border-r pr-4">
                <span class="text-sm font-bold text-gray-700">مدير النظام</span>
                <div class="w-8 h-8 rounded-full moodle-gradient flex items-center justify-center text-white">
                    <i class="fas fa-user-shield text-xs"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex min-h-[calc(100vh-64px)]">
        
        <!-- Sidebar Navigation -->
        <aside class="w-64 bg-white border-l hidden lg:block shadow-sm">
            <div class="p-4 border-b">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">إدارة المقرر</h3>
            </div>
            <nav class="mt-2">
                <a href="#" class="sidebar-item flex items-center p-4 text-gray-700 bg-gray-50 border-r-4 border-[#f98012]">
                    <i class="fas fa-desktop ml-3 text-[#f98012]"></i>
                    <span class="text-sm font-bold">لوحة العرض</span>
                </a>
                <a href="#" class="sidebar-item flex items-center p-4 text-gray-600">
                    <i class="fas fa-archive ml-3"></i>
                    <span class="text-sm">بنك المحتوى</span>
                </a>
                <a href="#" class="sidebar-item flex items-center p-4 text-gray-600">
                    <i class="fas fa-users ml-3"></i>
                    <span class="text-sm">المشاركون</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-8">
            
            <!-- Breadcrumbs -->
            <div class="flex items-center gap-2 text-xs text-gray-400 mb-6">
                <span>الرئيسية</span>
                <i class="fas fa-chevron-left text-[8px]"></i>
                <span>المقررات</span>
                <i class="fas fa-chevron-left text-[8px]"></i>
                <span class="text-gray-800 font-bold">مشغل H5P السحابي</span>
            </div>

            <!-- Player Container -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-orange-50 rounded-xl flex items-center justify-center text-[#f98012]">
                            <i class="fas fa-play-circle text-2xl"></i>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold text-gray-800">تشغيل المحتوى التفاعلي</h1>
                            <p class="text-xs text-gray-500">قم برفع الملف لبدء التج
